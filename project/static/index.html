<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 推理网关 · 多轮对话</title>
    <style>
        :root {
            --bg: #f9fafb;
            --surface: #ffffff;
            --primary: #4f46e5;
            --text: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --radius: 12px;
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
        }
        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-new {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-new:hover { opacity: 0.9; }
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conv-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.1s;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-item:hover { background: #f3f4f6; }
        .conv-item.active { background: #e0e7ff; color: var(--primary); font-weight: 500; }
        /* 主聊天区 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .user .avatar { background: #c7d2fe; }
        .bubble {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 16px;
            border-top-left-radius: 4px;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 15px;
        }
        .user .bubble {
            background: var(--primary);
            color: #fff;
            border-radius: 16px 16px 4px 16px;
        }
        .loading .bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }
        .loading-dot {
            width: 6px; height: 6px; background: #9ca3af; border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fff;
        }
        textarea {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 20px;
            resize: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        button.send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        button.send:active { transform: scale(0.95); }
        button.send:disabled { background: #9ca3af; cursor: not-allowed; }
        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <span>✨ 会话列表</span>
        <button class="btn-new" onclick="newConversation()">+ 新对话</button>
    </div>
    <div class="conversation-list" id="convList"></div>
</div>
<div class="chat-container" id="chatContainer">
    <div class="empty-chat" id="emptyHint">选择或创建一个会话开始聊天</div>
    <div class="messages" id="messages" style="display: none;"></div>
    <div class="input-area" style="display: none;" id="inputArea">
        <textarea id="promptInput" rows="1" placeholder="输入你的问题，回车发送..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="send" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const API_BASE = '';  // 如果通过后端提供服务，不用改

    // 全局状态
    let currentConversationId = null;
    let isWaiting = false;

    // DOM元素
    const convListEl = document.getElementById('convList');
    const messagesEl = document.getElementById('messages');
    const emptyHint = document.getElementById('emptyHint');
    const inputArea = document.getElementById('inputArea');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');

    // ========== 初始化 ==========
    async function loadConversations() {
        try {
            const resp = await fetch(API_BASE + '/conversations');
            const convs = await resp.json();
            renderConversationList(convs);
        } catch (err) {
            console.error('加载会话列表失败:', err);
        }
    }

    function renderConversationList(convs) {
        convListEl.innerHTML = '';
        convs.forEach(conv => {
            const div = document.createElement('div');
            div.className = 'conv-item' + (conv.id === currentConversationId ? ' active' : '');
            div.textContent = conv.title || '新对话';
            div.onclick = () => switchConversation(conv.id);
            convListEl.appendChild(div);
        });
    }

    async function newConversation() {
        try {
            const resp = await fetch(API_BASE + '/conversations', { method: 'POST' });
            const data = await resp.json();
            await loadConversations();
            switchConversation(data.id);
        } catch (err) {
            console.error('创建会话失败:', err);
        }
    }

    async function switchConversation(convId) {
        currentConversationId = convId;
        // 高亮当前会话
        document.querySelectorAll('.conv-item').forEach(el => {
            el.classList.toggle('active', el.textContent === convId || el.textContent === '新对话'); // 简单处理
        });
        // 显示聊天区，隐藏空状态
        emptyHint.style.display = 'none';
        messagesEl.style.display = 'flex';
        inputArea.style.display = 'flex';
        messagesEl.innerHTML = '<div class="message assistant">正在加载历史消息...</div>';

        // 加载历史消息
        try {
            const resp = await fetch(API_BASE + '/conversations/messages?id=' + convId);
            const msgs = await resp.json();
            messagesEl.innerHTML = '';
            msgs.forEach(msg => addMessage(msg.role, msg.content, false));
        } catch (err) {
            messagesEl.innerHTML = '<div class="message assistant">加载历史消息失败</div>';
        }
        promptInput.focus();
    }

    // ========== 消息渲染 ==========
    function addMessage(role, content, shouldAnimate = true) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (!shouldAnimate) div.style.animation = 'none';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        scrollToBottom();
        return bubble;
    }

    function addLoadingIndicator() {
        const div = document.createElement('div');
        div.className = 'message assistant loading';
        div.id = 'loadingMsg';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        scrollToBottom();
        return div;
    }

    function removeLoadingIndicator() {
        const el = document.getElementById('loadingMsg');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ========== 发送消息 ==========
    async function sendMessage() {
        if (isWaiting || !currentConversationId) return;
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        isWaiting = true;
        sendBtn.disabled = true;
        promptInput.disabled = true;
        addMessage('user', prompt);
        promptInput.value = '';
        promptInput.style.height = 'auto';

        const loadingEl = addLoadingIndicator();

        try {
            // 1. 创建任务（异步）
            const createResp = await fetch(API_BASE + '/task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt, conversation_id: currentConversationId })
            });
            if (!createResp.ok) throw new Error('创建任务失败: ' + await createResp.text());
            const { id: taskId } = await createResp.json();
            console.log('任务ID:', taskId);

            // 2. 流式获取结果
            const streamSuccess = await tryStreamResult(taskId);
            if (!streamSuccess) {
                // 回退到轮询
                await pollUntilDone(taskId);
            }
        } catch (err) {
            console.error(err);
            removeLoadingIndicator();
            addMessage('assistant', '❌ 请求失败: ' + err.message);
        } finally {
            removeLoadingIndicator();
            isWaiting = false;
            sendBtn.disabled = false;
            promptInput.disabled = false;
            promptInput.focus();
        }
    }

    async function tryStreamResult(taskId) {
        try {
            const response = await fetch(API_BASE + `/result/stream?id=${taskId}`);
            if (!response.ok) return false;
            removeLoadingIndicator();
            const bubble = addMessage('assistant', '', false); // 空内容，准备逐字填充
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') {
                            console.log('流式完成');
                            return true;
                        }
                        bubble.textContent += data;
                        scrollToBottom();
                    }
                }
            }
            return true;
        } catch (e) {
            console.warn('流式请求失败:', e);
            return false;
        }
    }

    async function pollUntilDone(taskId) {
        const maxAttempts = 60;
        for (let i = 0; i < maxAttempts; i++) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            try {
                const resp = await fetch(API_BASE + `/result?id=${taskId}`);
                if (!resp.ok) continue;
                const task = await resp.json();
                if (task.status === 'done') {
                    removeLoadingIndicator();
                    addMessage('assistant', task.result || '(空回复)');
                    return;
                }
            } catch (e) {
                console.error('轮询出错:', e);
            }
        }
        removeLoadingIndicator();
        addMessage('assistant', '⏰ 任务超时，请稍后重试');
    }

    // 自动调整输入框高度
    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 启动
    loadConversations();
</script>
</body>
</html>
