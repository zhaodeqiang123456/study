<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 推理网关 · 对话测试</title>
    <style>
        :root {
            --bg: #f9fafb;
            --surface: #ffffff;
            --primary: #4f46e5;
            --text: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 18px;
            color: var(--primary);
            background: #fafafa;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .user .avatar { background: #c7d2fe; }
        .bubble {
            background: #f3f4f6;
            padding: 12px 16px;
            border-radius: 16px;
            border-top-left-radius: 4px;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 15px;
        }
        .user .bubble {
            background: var(--primary);
            color: #fff;
            border-radius: 16px 16px 4px 16px;
        }
        .loading .bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }
        .loading-dot {
            width: 6px; height: 6px; background: #9ca3af; border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: #fff;
        }
        textarea {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 20px;
            resize: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .status {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 4px 0 0 8px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">✨ AI 推理网关 · 异步任务测试</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="promptInput" rows="1" placeholder="输入你的问题，回车发送..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ========== 配置 ==========
    // 如果通过后端服务访问（推荐），不用改；如果是本地双击打开，请改成完整URL
    const API_BASE = ''; // e.g., 'http://localhost:8080'

    // 状态
    let isWaiting = false;

    // ========== 工具函数 ==========
    function $(id) { return document.getElementById(id); }
    const messagesDiv = $('messages');
    const promptInput = $('promptInput');
    const sendBtn = $('sendBtn');

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 添加消息
    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? '👤' : '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = content;
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesDiv.appendChild(div);
        scrollToBottom();
        return bubble;
    }

    // 添加加载动画
    function addLoadingIndicator() {
        const div = document.createElement('div');
        div.className = 'message assistant loading';
        div.id = 'loadingMsg';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '🤖';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';
        div.appendChild(avatar);
        div.appendChild(bubble);
        messagesDiv.appendChild(div);
        scrollToBottom();
        return div;
    }

    function removeLoadingIndicator() {
        const el = $('loadingMsg');
        if (el) el.remove();
    }

    // 设置UI状态
    function setInputEnabled(enabled) {
        promptInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) promptInput.focus();
    }

    // ========== 发送消息 ==========
    async function sendMessage() {
        if (isWaiting) return;
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        isWaiting = true;
        setInputEnabled(false);
        addMessage('user', prompt);
        promptInput.value = '';
        promptInput.style.height = 'auto';

        const loadingEl = addLoadingIndicator();

        try {
            // 1. 创建任务
            const createResp = await fetch(API_BASE + '/task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            if (!createResp.ok) throw new Error('创建任务失败: ' + await createResp.text());
            const { id: taskId } = await createResp.json();
            console.log('任务ID:', taskId);

            // 2. 尝试流式获取结果，失败则回退到轮询
            const streamSupported = await tryStreamResult(taskId);
            if (!streamSupported) {
                // 流式不可用，改用轮询
                console.log('流式端点不可用，切换到轮询模式');
                await pollUntilDone(taskId);
            }
        } catch (err) {
            console.error(err);
            removeLoadingIndicator();
            addMessage('assistant', '❌ 请求失败: ' + err.message);
        } finally {
            removeLoadingIndicator();
            setInputEnabled(true);
            isWaiting = false;
            scrollToBottom();
        }
    }

    // ========== 流式处理（SSE） ==========
    async function tryStreamResult(taskId) {
        try {
            const response = await fetch(API_BASE + `/result/stream?id=${taskId}`);
            if (!response.ok) return false; // 可能路由未实现

            removeLoadingIndicator();
            const bubble = addMessage('assistant', ''); // 空内容，准备逐字填充
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') {
                            console.log('流式完成');
                            return true;
                        }
                        bubble.textContent += data;
                        scrollToBottom();
                    }
                }
            }
            return true;
        } catch (e) {
            console.warn('流式请求失败:', e);
            return false;
        }
    }

    // ========== 轮询降级 ==========
    async function pollUntilDone(taskId) {
        const maxAttempts = 60; // 最多等 60 秒
        for (let i = 0; i < maxAttempts; i++) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            try {
                const resp = await fetch(API_BASE + `/result?id=${taskId}`);
                if (!resp.ok) continue;
                const task = await resp.json();
                if (task.status === 'done') {
                    removeLoadingIndicator();
                    addMessage('assistant', task.result || '(空回复)');
                    return;
                }
                // 如果状态是 pending，继续等待
                console.log('任务状态:', task.status);
            } catch (e) {
                console.error('轮询出错:', e);
            }
        }
        removeLoadingIndicator();
        addMessage('assistant', '⏰ 任务超时，请稍后重试');
    }

    // 自动调整输入框高度
    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 初始化
    promptInput.focus();
</script>
</body>
</html>
